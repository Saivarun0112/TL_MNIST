<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MNIST Digit Classifier</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.0.0/dist/tabler-icons.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f5f5f3;
      color: #1a1a18;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 3rem 1rem;
    }

    @media (prefers-color-scheme: dark) {
      body { background: #1a1a18; color: #f0ede6; }
      .card { background: #232320; border-color: rgba(255,255,255,0.1); }
      .secondary-bg { background: #2c2c2a; }
      .muted { color: #888780; }
      .hint { color: #5f5e5a; }
      .bar-bg { background: #3a3a38; }
      .bar-border { border-color: rgba(255,255,255,0.15); }
      button { border-color: rgba(255,255,255,0.2); color: #d3d1c7; }
      button:hover { background: #2c2c2a; }
      #drop-zone { border-color: rgba(255,255,255,0.2); }
      #error-box { background: #3a1f1f; border-color: rgba(227,75,74,0.4); color: #f09595; }
    }

    @media (prefers-color-scheme: light) {
      .card { background: #fff; border-color: rgba(0,0,0,0.12); }
      .secondary-bg { background: #f1efe8; }
      .muted { color: #5f5e5a; }
      .hint { color: #888780; }
      .bar-bg { background: #e0ded6; }
      .bar-border { border-color: rgba(0,0,0,0.15); }
      button { border-color: rgba(0,0,0,0.2); color: #444; }
      button:hover { background: #f1efe8; }
      #drop-zone { border-color: rgba(0,0,0,0.2); }
      #error-box { background: #fcebeb; border-color: rgba(162,45,45,0.3); color: #a32d2d; }
    }

    .container { width: 100%; max-width: 640px; }

    h1 { font-size: 22px; font-weight: 500; margin-bottom: 0.4rem; }
    .subtitle { font-size: 14px; margin-bottom: 2rem; }

    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; align-items: start; }

    #drop-zone {
      border: 1px dashed;
      border-radius: 12px;
      padding: 2rem 1rem;
      text-align: center;
      cursor: pointer;
      min-height: 180px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: background 0.15s;
    }
    #drop-zone:hover { opacity: 0.85; }
    #drop-zone i { font-size: 28px; }

    #preview-wrap { display: none; margin-top: 0; }
    #preview {
      width: 100%;
      border-radius: 8px;
      border: 0.5px solid rgba(0,0,0,0.12);
      display: block;
    }

    .card {
      border: 0.5px solid;
      border-radius: 12px;
      padding: 1.25rem 1rem;
      overflow: hidden;
    }

    .secondary-bg {
      border-radius: 12px;
      padding: 1.5rem 1rem;
      min-height: 180px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      text-align: center;
    }
    .secondary-bg i { font-size: 28px; }

    #result-loading { display: none; }
    #result-box { display: none; }
    #error-box {
      display: none;
      border: 0.5px solid;
      border-radius: 8px;
      padding: 0.85rem 1rem;
      font-size: 13px;
      margin-top: 0;
    }

    .digit-row { display: flex; align-items: baseline; gap: 10px; margin-bottom: 1rem; }
    #digit-display { font-size: 48px; font-weight: 500; line-height: 1; }
    #conf-label { font-size: 20px; font-weight: 500; }
    .conf-sub { font-size: 12px; }

    .bar-row { display: flex; align-items: center; gap: 6px; }
    .bar-label { font-size: 12px; min-width: 10px; }
    .bar-track { flex: 1; border-radius: 3px; height: 8px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 3px; transition: width 0.4s; }
    .bar-pct { font-size: 11px; min-width: 38px; text-align: right; }
    #bars { display: flex; flex-direction: column; gap: 5px; }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      width: 24px; height: 24px;
      border: 2px solid rgba(0,0,0,0.15);
      border-top-color: #555;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @media (prefers-color-scheme: dark) {
      .spinner { border-color: rgba(255,255,255,0.15); border-top-color: #d3d1c7; }
    }

    button {
      width: 100%;
      padding: 10px;
      font-size: 15px;
      font-weight: 500;
      background: transparent;
      border: 0.5px solid;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.1s;
    }
    button:disabled { opacity: 0.4; cursor: default; }
    button:active:not(:disabled) { transform: scale(0.98); }

    #predict-btn { margin-top: 1.5rem; }

    .success-color { color: #0f6e56; }
    @media (prefers-color-scheme: dark) { .success-color { color: #5dcaa5; } }

    @media (max-width: 480px) {
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>MNIST digit classifier</h1>
    <p class="subtitle muted">Upload a handwritten digit image to classify it</p>

    <div class="grid">
      <div>
        <div
          id="drop-zone"
          class="secondary-bg"
          onclick="document.getElementById('file-input').click()"
          ondragover="event.preventDefault(); this.classList.add('drag-over')"
          ondragleave="this.classList.remove('drag-over')"
          ondrop="handleDrop(event)"
          role="button"
          tabindex="0"
          aria-label="Upload digit image"
          onkeydown="if(event.key==='Enter')this.click()"
        >
          <i class="ti ti-upload muted" aria-hidden="true"></i>
          <span style="font-size: 14px;" class="muted">Click or drag an image here</span>
          <span style="font-size: 12px;" class="hint">PNG, JPG, BMP</span>
        </div>
        <input type="file" id="file-input" accept="image/*" style="display:none;" onchange="handleFile(this.files[0])">

        <div id="preview-wrap">
          <img id="preview" alt="Preview of uploaded digit">
          <button onclick="reset()" style="font-size:13px; margin-top: 8px;">
            <i class="ti ti-refresh" aria-hidden="true"></i> Clear
          </button>
        </div>
      </div>

      <div>
        <div id="result-idle" class="secondary-bg">
          <i class="ti ti-chart-bar hint" aria-hidden="true"></i>
          <span style="font-size:13px;" class="hint">Results will appear here</span>
        </div>

        <div id="result-loading" class="secondary-bg">
          <div class="spinner" role="status" aria-label="Classifying"></div>
          <span style="font-size:13px;" class="muted">Classifying…</span>
        </div>

        <div id="result-box" class="card" aria-live="polite">
          <div class="digit-row">
            <span id="digit-display"></span>
            <div>
              <div id="conf-label"></div>
              <div class="conf-sub muted">confidence</div>
            </div>
          </div>
          <div id="bars"></div>
        </div>

        <div id="error-box" role="alert">
          <i class="ti ti-alert-circle" aria-hidden="true"></i>
          <span id="error-msg"></span>
        </div>
      </div>
    </div>

    <button id="predict-btn" onclick="predict()" disabled>
      Predict digit
    </button>
  </div>

  <script>
    let selectedFile = null;

    function handleFile(file) {
      if (!file) return;
      selectedFile = file;
      const reader = new FileReader();
      reader.onload = e => {
        document.getElementById('preview').src = e.target.result;
        document.getElementById('preview-wrap').style.display = 'block';
        document.getElementById('drop-zone').style.display = 'none';
        document.getElementById('predict-btn').disabled = false;
        showIdle();
      };
      reader.readAsDataURL(file);
    }

    function handleDrop(e) {
      e.preventDefault();
      e.currentTarget.classList.remove('drag-over');
      const file = e.dataTransfer.files[0];
      if (file && file.type.startsWith('image/')) handleFile(file);
    }

    function reset() {
      selectedFile = null;
      document.getElementById('preview-wrap').style.display = 'none';
      document.getElementById('drop-zone').style.display = 'flex';
      document.getElementById('predict-btn').disabled = true;
      document.getElementById('file-input').value = '';
      showIdle();
    }

    function showOnly(id) {
      ['result-idle', 'result-loading', 'result-box', 'error-box']
        .forEach(x => document.getElementById(x).style.display = 'none');
      if (id) document.getElementById(id).style.display = ['result-idle','result-loading'].includes(id) ? 'flex' : 'block';
    }

    function showIdle() { showOnly('result-idle'); }

    async function predict() {
      if (!selectedFile) return;
      showOnly('result-loading');
      document.getElementById('predict-btn').disabled = true;

      const form = new FormData();
      form.append('file', selectedFile);

      try {
        const res = await fetch('/predict', { method: 'POST', body: form });
        if (!res.ok) {
          const txt = await res.text();
          throw new Error(`Server error ${res.status}: ${txt.slice(0, 120)}`);
        }
        const data = await res.json();
        renderResult(data);
      } catch (err) {
        showOnly('error-box');
        document.getElementById('error-msg').textContent = err.message || 'Could not connect to /predict';
      } finally {
        document.getElementById('predict-btn').disabled = false;
      }
    }

    function renderResult(data) {
      document.getElementById('digit-display').textContent = data.predicted_digit;
      document.getElementById('conf-label').textContent = data.confidence.toFixed(1) + '%';

      const probs = data.all_probs;
      const max = Math.max(...probs);
      const bars = document.getElementById('bars');
      bars.innerHTML = '';

      probs.forEach((p, i) => {
        const isTop = i === data.predicted_digit;
        const pct = max > 0 ? (p / max) * 100 : 0;
        const row = document.createElement('div');
        row.className = 'bar-row';
        row.innerHTML = `
          <span class="bar-label muted">${i}</span>
          <div class="bar-track bar-bg">
            <div class="bar-fill" style="width:${pct.toFixed(1)}%; background:${isTop ? '#1D9E75' : 'rgba(128,128,128,0.35)'}"></div>
          </div>
          <span class="bar-pct ${isTop ? 'success-color' : 'hint'}">${p.toFixed(1)}%</span>`;
        bars.appendChild(row);
      });

      showOnly('result-box');
    }
  </script>
</body>
</html>
